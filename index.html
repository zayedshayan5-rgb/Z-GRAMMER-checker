<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Grammar AI | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #1e293b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* App Wrapper */
        .app-wrapper {
            width: 95%;
            max-width: 1300px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 3px; margin-top: 5px; }

        /* Workspace Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            flex-grow: 1;
            min-height: 0; /* Important for flex child scrolling */
        }

        .panel { display: flex; flex-direction: column; gap: 10px; }
        label { color: var(--primary); font-weight: 600; font-size: 13px; text-transform: uppercase; }

        textarea, .output-box {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            font-size: 17px;
            color: #fff;
            outline: none;
            resize: none;
            line-height: 1.6;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); }

        .output-box {
            position: relative;
            overflow-y: auto;
            white-space: pre-wrap;
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .btn-solve {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-solve:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(99, 102, 241, 0.4); }
        .btn-solve:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .btn-copy {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Payment Banner */
        .upgrade-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(99, 102, 241, 0.1);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px dashed var(--primary);
        }

        .btn-upgrade {
            background: white; color: var(--bg); border: none;
            padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* Modal */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .modal {
            background: white; color: #333; width: 350px; padding: 30px; border-radius: 25px; text-align: center;
        }
        .bkash { background: #e2136e; color: white; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 20px; font-weight: 700; }

        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
            .app-wrapper { height: 95vh; padding: 15px; overflow-y: auto; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1>Z-GRAMMAR PRO</h1>
            <p>Z-POINT TECHNOLOGY • AI ASSISTANT</p>
        </header>

        <div class="workspace">
            <div class="panel">
                <label>Input English</label>
                <textarea id="userInput" placeholder="Paste your text here..."></textarea>
            </div>
            <div class="panel">
                <label>AI Perfected Version</label>
                <div class="output-box" id="outputContainer">
                    <button class="btn-copy" onclick="copyText()">Copy</button>
                    <span id="resultText" style="opacity: 0.4;">Your corrected text will appear here...</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-solve" id="solveBtn" onclick="solveGrammar()">SOLVE NOW</button>
        </div>

        <div class="upgrade-banner">
            <div>
                <p style="font-weight: 600; font-size: 15px;">🚀 Upgrade to PRO Unlimited</p>
                <p style="font-size: 12px; color: #94a3b8;">৳২৫০/month • No ads • Deep analysis</p>
            </div>
            <button class="btn-upgrade" onclick="openModal()">UPGRADE</button>
        </div>
    </div>

    <div class="overlay" id="payModal">
        <div class="modal">
            <h2 style="color: #e2136e;">Bkash/Nagad</h2>
            <p style="font-size: 14px; margin-top: 10px;">নিচের নাম্বারে <b>৳২৫০</b> টাকা 'Send Money' করুন:</p>
            <div class="bkash">01620416060</div>
            <input type="text" placeholder="Transaction ID" id="trx" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
            <button style="width:100%; background:#e2136e; color:white; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="submitPayment()">SUBMIT</button>
            <p style="margin-top:15px; color:red; cursor:pointer; font-size:12px;" onclick="closeModal()">Close</p>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyC6rhmnl0uPBVoefTHav8qJy2c9Be199zg"; 

        async function solveGrammar() {
            const input = document.getElementById('userInput').value.trim();
            const resultText = document.getElementById('resultText');
            const solveBtn = document.getElementById('solveBtn');

            if (!input) {
                alert("Please write something first!");
                return;
            }

            solveBtn.disabled = true;
            solveBtn.innerText = "ANALYZING...";
            resultText.style.opacity = "0.4";
            resultText.innerText = "Processing with Gemini AI...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Fix grammar, spelling, and style. Only output the corrected version: "${input}"`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resultText.innerText = data.candidates[0].content.parts[0].text.trim();
                    resultText.style.opacity = "1";
                } else {
                    throw new Error();
                }

            } catch (e) {
                resultText.innerText = "Error: Check your connection or API key.";
                resultText.style.color = "#ff4d4d";
            } finally {
                solveBtn.disabled = false;
                solveBtn.innerText = "SOLVE NOW";
            }
        }

        function copyText() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }

        function openModal() { document.getElementById('payModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('payModal').style.display = 'none'; }
        function submitPayment() {
            const trx = document.getElementById('trx').value;
            if(trx.length < 5) return alert("Enter valid TrxID");
            alert("Payment Sent! We will verify TrxID: " + trx);
            closeModal();
        }
    </script>
</body>
</html>
